    <circle cx="6" cy="19" r="2.5" fill="#1a1a2e"/>
    <circle cx="6" cy="19" r="1" fill="#f5b800"/>
    <circle cx="21" cy="19" r="2.5" fill="#1a1a2e"/>
    <circle cx="21" cy="19" r="1" fill="#f5b800"/>
