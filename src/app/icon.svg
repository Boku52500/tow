    <line x1="8" y1="3" x2="12" y2="3" stroke="#f5b800" stroke-width="2" stroke-linecap="round"/>
    <!-- Hook -->
    <path d="M12 3 L12 6 Q12 8 10 8" stroke="#f5b800" stroke-width="1.5" fill="none" stroke-linecap="round"/>
